---
name: bluenoc
description: Fedora Silverblue with Niri and Noctalia
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    install:
      packages:
        # compositor
        - niri
        - xwayland-satellite
        # shell
        - noctalia-shell
        # terminal
        - kitty
        # nautilus extensions
        - nautilus-python
    remove:
      packages:
        - gnome-software
        - gnome-tour
        - gnome-system-monitor
        - gnome-classic-session
        - gnome-initial-setup
        - firefox
        - firefox-langpacks
        - ptyxis

  - type: default-flatpaks
    configurations:
      - scope: system
        install:
          - io.github.kolunmi.Bazaar
          - com.github.tchx84.Flatseal
          - io.github.flattool.Warehouse

  - type: signing
