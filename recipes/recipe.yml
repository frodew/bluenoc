---
name: bluenoc
description: Fedora Silverblue with Niri and Noctalia
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 44

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    snippets:
      - "systemctl --global enable topgrade.timer"

  - type: dnf
    repos:
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    install:
      packages:
        # compositor
        - niri
        - xwayland-satellite
        # shell
        - noctalia-shell
        # terminal
        - kitty
        # other
        - keyd
        - kanata
        - wl-mirror
        - network-manager-applet
        - wtype
    remove:
      packages:
        - gnome-software
        - gnome-tour
        - gnome-system-monitor
        - gnome-classic-session
        - gnome-initial-setup
        - gnome-user-docs
        - gnome-user-share
        - gnome-remote-desktop
        - yelp
        - yelp-libs
        - yelp-xsl
        - malcontent-control
        - firefox
        - firefox-langpacks
        - ptyxis
        - nvtop
        - nano
        - b43-fwcutter
        - b43-openfwwf
        - brcmfmac-firmware

  - type: containerfile
    snippets:
      - RUN dnf install -y --setopt=tsflags=noscripts displaylink && dnf clean all

  - type: script
    snippets:
      - |
        set -euo pipefail
        QUARTO_VER=$(curl -fsSL https://api.github.com/repos/quarto-dev/quarto-cli/releases/latest \
          | grep -oP '"tag_name":\s*"v\K[^"]+')
        curl -fsSL "https://github.com/quarto-dev/quarto-cli/releases/download/v${QUARTO_VER}/quarto-${QUARTO_VER}-linux-amd64.tar.gz" \
          | tar xz -C /usr/lib
        mv "/usr/lib/quarto-${QUARTO_VER}" /usr/lib/quarto
        ln -sf /usr/lib/quarto/bin/quarto /usr/bin/quarto

  - type: brew
    brew-analytics: false

  - type: signing
