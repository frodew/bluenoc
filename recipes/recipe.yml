---
name: bluenoc
description: Fedora Silverblue with Niri and Noctalia
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: script
    snippets:
      - "systemctl --global enable topgrade.timer"

  - type: dnf
    repos:
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
    install:
      packages:
        # compositor
        - niri
        - xwayland-satellite
        # shell
        - noctalia-shell
        # terminal
        - kitty
        # other
        - keyd
        - wl-mirror
        - evolution-data-server
    remove:
      packages:
        - gnome-software
        - gnome-tour
        - gnome-system-monitor
        - gnome-classic-session
        - gnome-initial-setup
        - gnome-user-docs
        - gnome-user-share
        - gnome-remote-desktop
        - yelp
        - yelp-libs
        - yelp-xsl
        - malcontent-control
        - firefox
        - firefox-langpacks
        - ptyxis
        - nvtop
        - nano
        - b43-fwcutter
        - b43-openfwwf
        - brcmfmac-firmware

  - type: containerfile
    snippets:
      - RUN rpm-ostree install --idempotent --setopt=tsflags=noscripts displaylink kmod-evdi && rpm-ostree cleanup -m

  - type: brew
    brew-analytics: false

  - type: signing
